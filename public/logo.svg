<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1527" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Neon Blue/Cyan Gradient -->
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Neon Emerald/Teal Gradient for "OS" active vibe -->
    <linearGradient id="neonTeal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Drop Shadow for Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="6" />

  <!-- Inner Ambient Glow Ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#2563eb" stroke-dasharray="8 16" stroke-width="2" opacity="0.3" />

  <!-- Abstract Intersecting Ribbon / "L" Symbol -->
  <g transform="translate(116, 116)" filter="url(#glow)">
    <!-- Main "L" shape with sleek rounded endpoints -->
    <path d="M 50 40 
             L 50 200 
             A 40 40 0 0 0 90 240 
             L 230 240" 
          fill="none" 
          stroke="url(#neonBlue)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Overlapping infinite loop dot / "OS" indicator -->
    <circle cx="210" cy="80" r="32" fill="url(#neonTeal)" />
    
    <!-- Pulse ring around the dot -->
    <circle cx="210" cy="80" r="50" fill="none" stroke="url(#neonTeal)" stroke-width="4" opacity="0.4" stroke-dasharray="10 10" />
  </g>
</svg>
